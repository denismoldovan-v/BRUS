# AI Security Demo — full local stack (PostgreSQL + Ollama + Next.js)
#
# Start:  docker compose up --build
# Stop:   docker compose down
# Logs:   docker compose logs -f app

name: brus

services:
  postgres:
    image: postgres:16-alpine
    container_name: brus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: brus
      POSTGRES_PASSWORD: brus
      POSTGRES_DB: brus
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brus -d brus"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    container_name: brus-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  # Pulls llama3.2 on first run (may take several minutes)
  ollama-pull:
    image: ollama/ollama:latest
    container_name: brus-ollama-pull
    depends_on:
      ollama:
        condition: service_started
    network_mode: service:ollama
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: >
      /bin/sh -c "
        echo 'Waiting for Ollama...';
        sleep 5;
        until ollama list >/dev/null 2>&1; do sleep 2; done;
        echo 'Pulling model llama3.2 (first run may take a while)...';
        ollama pull llama3.2;
        echo 'Model llama3.2 ready.';
      "
    restart: "no"

  app:
    build:
      context: ./front
      dockerfile: Dockerfile
    container_name: brus-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      AUTH_SECRET: ${AUTH_SECRET:-dev-secret-change-me-in-production-32chars}
      POSTGRES_URL: postgresql://brus:brus@postgres:5432/brus
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      USE_MOCK_AI: "0"
      NODE_ENV: development
    volumes:
      - ./front:/app
      - app_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully

volumes:
  postgres_data:
  ollama_data:
  app_node_modules:
